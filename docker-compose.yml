version: "3.9"

services:
  recommender-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laomusic-recommender-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_LOG_LEVEL=info
      - APP_TIMEOUT=120
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
